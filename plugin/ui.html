<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #2c2c2c; color: #e0e0e0; font-size: 13px;
    padding: 16px; height: 100vh; display: flex; flex-direction: column;
    gap: 12px; user-select: none;
  }
  .status-row { display: flex; align-items: center; gap: 8px; }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #666; flex-shrink: 0;
    transition: background 0.3s;
  }
  .dot.connected { background: #1a8c4a; box-shadow: 0 0 6px #1a8c4a88; }
  .dot.disconnected { background: #e04848; box-shadow: 0 0 6px #e0484888; }
  .dot.connecting { background: #d4a040; box-shadow: 0 0 6px #d4a04088; }
  .label { color: #b0b0b0; }
  .value { color: #e0e0e0; }
  .stat-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    background: #222; border-radius: 8px; padding: 12px;
  }
  .stat-item { display: flex; flex-direction: column; gap: 2px; }
  .stat-label { font-size: 11px; color: #888; }
  .stat-value { font-size: 16px; font-weight: 600; color: #fff; }
  .info-line { font-size: 11px; color: #888; }
  .footer { margin-top: auto; font-size: 10px; color: #555; text-align: center; }
</style>

<div class="status-row">
  <div class="dot" id="dot"></div>
  <span class="label">Proxy:</span>
  <span class="value" id="statusText">Connecting...</span>
</div>

<div class="stat-grid">
  <div class="stat-item">
    <span class="stat-label">Nodes</span>
    <span class="stat-value" id="nodeCount">0</span>
  </div>
  <div class="stat-item">
    <span class="stat-label">Styles</span>
    <span class="stat-value" id="styleCount">0</span>
  </div>
</div>

<div class="info-line" id="lastSync">Last sync: --</div>
<div class="info-line" id="wsInfo">ws://localhost:3000</div>
<div class="footer">Figma Proxy MCP</div>

<script>
  var WS_URL = 'ws://localhost:3000'
  var ws = null
  var intervalId = null
  var nodeCount = 0
  var styleCount = 0

  var dot = document.getElementById('dot')
  var statusText = document.getElementById('statusText')
  var nodeCountEl = document.getElementById('nodeCount')
  var styleCountEl = document.getElementById('styleCount')
  var lastSyncEl = document.getElementById('lastSync')

  function setStatus(state, text) {
    dot.className = 'dot ' + state
    statusText.textContent = text
  }

  function connect() {
    setStatus('connecting', 'Connecting...')
    ws = new WebSocket(WS_URL)

    ws.onopen = function () {
      setStatus('connected', 'Connected')
      if (intervalId) clearInterval(intervalId)
      intervalId = setInterval(function () {
        window.parent.postMessage({ pluginMessage: { type: 'collect' } }, '*')
      }, 3000)
    }

    ws.onmessage = function (event) {
      try {
        var msg = JSON.parse(event.data)
        if (msg.type === 'request_export' && msg.nodeId) {
          window.parent.postMessage({ pluginMessage: { type: 'export', nodeId: msg.nodeId } }, '*')
        }
      } catch (_e) {}
    }

    ws.onclose = function () {
      setStatus('disconnected', 'Disconnected (retry...)')
      if (intervalId) clearInterval(intervalId)
      setTimeout(connect, 2000)
    }

    ws.onerror = function () {}
  }

  window.onmessage = function (event) {
    var msg = event.data.pluginMessage
    if (!msg) return

    if (msg.type === 'snapshot') {
      var now = new Date()
      lastSyncEl.textContent = 'Last sync: ' + now.toLocaleTimeString()

      var payload = msg.payload
      if (payload) {
        nodeCount = payload.nodes ? payload.nodes.length : 0
        styleCount = payload.styles ? payload.styles.length : 0
        nodeCountEl.textContent = nodeCount
        styleCountEl.textContent = styleCount
      }

      fetch('http://localhost:3000/snapshot', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      }).catch(function () {})
    }

    if (msg.type === 'asset' && msg.payload) {
      fetch('http://localhost:3000/asset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(msg.payload)
      }).catch(function () {})
    }
  }

  connect()
</script>
