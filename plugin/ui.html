<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #2c2c2c; color: #e0e0e0; font-size: 13px;
    padding: 16px; height: 100vh; display: flex; flex-direction: column;
    gap: 10px; user-select: none;
  }
  .row { display: flex; align-items: center; gap: 8px; }
  .dot {
    width: 10px; height: 10px; border-radius: 50%; background: #666; flex-shrink: 0;
    transition: background 0.3s;
  }
  .dot.connected { background: #1a8c4a; box-shadow: 0 0 6px #1a8c4a88; }
  .dot.disconnected { background: #e04848; box-shadow: 0 0 6px #e0484888; }
  .dot.connecting { background: #d4a040; box-shadow: 0 0 6px #d4a04088; }
  .label { color: #b0b0b0; }
  .value { color: #e0e0e0; }
  .info { font-size: 11px; color: #888; word-break: break-all; }
  .stat-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    background: #222; border-radius: 8px; padding: 12px;
  }
  .stat-item { display: flex; flex-direction: column; gap: 2px; }
  .stat-label { font-size: 11px; color: #888; }
  .stat-value { font-size: 16px; font-weight: 600; color: #fff; }
  .footer { margin-top: auto; font-size: 10px; color: #555; text-align: center; }
  .url-row { display: flex; align-items: center; gap: 6px; }
  .url-row input {
    flex: 1; background: #1a1a1a; border: 1px solid #444; border-radius: 4px;
    color: #e0e0e0; font-size: 11px; padding: 4px 8px; outline: none;
    font-family: monospace; min-width: 0;
  }
  .url-row input:focus { border-color: #666; }
  .url-row button {
    background: #333; border: 1px solid #555; border-radius: 4px;
    color: #e0e0e0; font-size: 11px; padding: 4px 10px; cursor: pointer;
    white-space: nowrap; flex-shrink: 0;
  }
  .url-row button:hover { background: #444; }
  .url-row button:active { background: #555; }
</style>

<div class="row">
  <div class="dot" id="dot"></div>
  <span class="label">Status:</span>
  <span class="value" id="statusText">Initializing...</span>
</div>
<div class="info" id="fileInfo"></div>

<div class="stat-grid">
  <div class="stat-item">
    <span class="stat-label">File</span>
    <span class="stat-value" id="fileName">-</span>
  </div>
  <div class="stat-item">
    <span class="stat-label">Selection</span>
    <span class="stat-value" id="selCount">0</span>
  </div>
</div>

<div class="info" id="requestInfo"></div>
<div class="url-row">
  <input type="text" id="wsUrlInput" placeholder="ws://localhost:3000" />
  <button id="connectBtn">Connect</button>
</div>
<div class="footer">Figma Proxy MCP</div>

<script>
  var WS_URL = 'ws://localhost:3000'
  var ws = null
  var socketRef = null
  var reconnectTimer = null
  var reconnectDelay = 1000
  var pingInterval = null
  var fileKey = ''
  var fileName = ''

  var dot = document.getElementById('dot')
  var statusText = document.getElementById('statusText')
  var fileInfo = document.getElementById('fileInfo')
  var fileNameEl = document.getElementById('fileName')
  var selCountEl = document.getElementById('selCount')
  var requestInfo = document.getElementById('requestInfo')
  var wsUrlInput = document.getElementById('wsUrlInput')
  var connectBtn = document.getElementById('connectBtn')

  connectBtn.addEventListener('click', function () {
    var newUrl = wsUrlInput.value.trim()
    if (!newUrl) return
    WS_URL = newUrl
    window.parent.postMessage({ pluginMessage: { type: 'save_ws_url', url: newUrl } }, '*')
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null }
    connect()
  })

  wsUrlInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') connectBtn.click()
  })

  function setStatus(state, text) {
    dot.className = 'dot ' + state
    statusText.textContent = text
  }

  function connect() {
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null }
    if (ws) { ws.onclose = null; ws.close() }

    var url = WS_URL + '/ws'
    if (fileKey) { url += '?fileKey=' + encodeURIComponent(fileKey) + '&fileName=' + encodeURIComponent(fileName) }
    setStatus('connecting', 'Connecting...')
    ws = new WebSocket(url)

    ws.onopen = function () {
      setStatus('connected', 'Connected')
      socketRef = ws
      reconnectDelay = 1000

      if (pingInterval) clearInterval(pingInterval)
      pingInterval = setInterval(function () {
        if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'ping' }))
      }, 30000)

      sendStatus()
    }

    ws.onmessage = function (event) {
      try {
        var msg = JSON.parse(event.data)
        if (msg.type === 'ping') { ws.send(JSON.stringify({ type: 'pong' })); return }
        if (msg.type === 'pong') return

        if (msg.type === 'request') {
          window.parent.postMessage({ pluginMessage: { type: 'request', requestId: msg.requestId, command: msg.command, params: msg.params || {} } }, '*')
        }
      } catch (_e) {}
    }

    ws.onclose = function () {
      setStatus('disconnected', 'Disconnected')
      socketRef = null
      if (pingInterval) { clearInterval(pingInterval); pingInterval = null }
      reconnectTimer = setTimeout(connect, reconnectDelay)
      reconnectDelay = Math.min(reconnectDelay * 2, 30000)
    }

    ws.onerror = function (e) {
      setStatus('disconnected', 'Connection error')
      console.error('WebSocket error', e)
    }
  }

  function sendStatus() {
    window.parent.postMessage({ pluginMessage: { type: 'get_status' } }, '*')
  }

  window.onmessage = function (event) {
    var msg = event.data.pluginMessage
    if (!msg) return

    if (msg.type === 'ws_url') {
      WS_URL = msg.url
      wsUrlInput.value = msg.url
    }

    if (msg.type === 'plugin-status' && msg.payload) {
      fileName = msg.payload.fileName || ''
      fileKey = msg.payload.fileKey || ''
      fileNameEl.textContent = fileName || '-'
      selCountEl.textContent = msg.payload.selectionCount || '0'
      fileInfo.textContent = 'fileKey: ' + fileKey

      if (!ws || ws.readyState === WebSocket.CLOSED || ws.readyState === WebSocket.CLOSING) {
        connect()
      }
    }

    if (msg.type === 'response') {
      if (socketRef && socketRef.readyState === WebSocket.OPEN) {
        socketRef.send(JSON.stringify({
          type: 'response',
          requestId: msg.requestId,
          data: msg.data,
          error: msg.error
        }))
      }
    }
  }

  window.parent.postMessage({ pluginMessage: { type: 'ui-ready' } }, '*')
</script>
