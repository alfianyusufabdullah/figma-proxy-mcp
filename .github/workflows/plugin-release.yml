name: Release Figma Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: plugin
        run: npm ci

      - name: Build plugin
        working-directory: plugin
        run: npm run build

      - name: Create release archive
        run: |
          zip -j figma-proxy-plugin-${{ github.ref_name }}.zip \
            plugin/manifest.json \
            plugin/ui.html \
            plugin/dist/code.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: figma-proxy-plugin-${{ github.ref_name }}.zip
          generate_release_notes: true
