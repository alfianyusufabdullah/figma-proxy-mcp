services:
  websocket:
    build: ./websocket
    ports:
      - "3000:3000"
    restart: unless-stopped

  mcp-server:
    build: ./mcp-server
    ports:
      - "3001:3001"
    environment:
      PROXY_URL: http://websocket:3000
      MCP_PORT: 3001
      MCP_API_KEY: ${MCP_API_KEY:-}
      MCP_PUBLIC_URL: ${MCP_PUBLIC_URL:-}
    depends_on:
      - websocket
    restart: unless-stopped